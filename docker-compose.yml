services:
  claude-withings:
    image: ghcr.io/aldarondo/claude-withings:latest
    container_name: claude-withings
    restart: unless-stopped
    volumes:
      - ./.env:/app/.env:ro
      - ./tokens.json:/app/tokens.json
      - ./monthly-hashes.json:/app/monthly-hashes.json
      - ./logs:/app/logs
    environment:
      - WITHINGS_CLIENT_ID=${WITHINGS_CLIENT_ID}
      - WITHINGS_CLIENT_SECRET=${WITHINGS_CLIENT_SECRET}
      - WITHINGS_DEFAULT_USER=${WITHINGS_DEFAULT_USER:-charles}
      - SERVER_HOST=${SERVER_HOST}
      - PORT=${PORT:-8769}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - WITHINGS_WEBHOOK_IPS=${WITHINGS_WEBHOOK_IPS:-}
      - MEM_URL=${MEM_URL:-}
      - MCP_CLIENT_ID=${MCP_CLIENT_ID:-}
      - MCP_CLIENT_SECRET=${MCP_CLIENT_SECRET:-}
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: claude-withings-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${WEBHOOK_TUNNEL_TOKEN:-}
    network_mode: host
    depends_on:
      - claude-withings
    profiles:
      - tunnel
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
