services:
  claude-withings:
    image: ghcr.io/aldarondo/claude-withings:latest
    container_name: claude-withings
    restart: unless-stopped
    environment:
      - WITHINGS_CLIENT_ID=${WITHINGS_CLIENT_ID}
      - WITHINGS_CLIENT_SECRET=${WITHINGS_CLIENT_SECRET}
      - WITHINGS_ACCESS_TOKEN=${WITHINGS_ACCESS_TOKEN}
      - WITHINGS_REFRESH_TOKEN=${WITHINGS_REFRESH_TOKEN}
      - WITHINGS_TOKEN_EXPIRES_AT=${WITHINGS_TOKEN_EXPIRES_AT:-0}
      - PORT=${PORT:-8769}
      - BRIAN_MEM_URL=${BRIAN_MEM_URL:-}
      - BRIAN_MCP_CLIENT_ID=${BRIAN_MCP_CLIENT_ID:-}
      - BRIAN_MCP_CLIENT_SECRET=${BRIAN_MCP_CLIENT_SECRET:-}
    network_mode: host
